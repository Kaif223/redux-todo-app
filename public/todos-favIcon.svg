<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="todoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4F46E5" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
  </defs>
  <!-- Rounded Background -->
  <rect width="512" height="512" rx="128" fill="url(#todoGrad)" />
  
  <!-- Checklist Elements -->
  <g fill="none" stroke="#FFFFFF" stroke-width="42" stroke-linecap="round" stroke-linejoin="round">
    <!-- Row 1: Checked -->
    <path d="M140 170 l40 40 l100 -100" stroke-width="48" />
    <line x1="340" y1="170" x2="420" y2="170" />
    
    <!-- Row 2: Unchecked / Bullet -->
    <circle cx="160" cy="290" r="24" fill="#FFFFFF" stroke="none" />
    <line x1="240" y1="290" x2="420" y2="290" />
    
    <!-- Row 3: Unchecked / Bullet -->
    <circle cx="160" cy="390" r="24" fill="#FFFFFF" stroke="none" />
    <line x1="240" y1="390" x2="360" y2="390" />
  </g>
</svg>
